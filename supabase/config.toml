[auth]
site_url = "https://connect.remoasset.in/"
additional_redirect_urls = [
  "https://connect.remoasset.in/reset-password",
  "https://connect.remoasset.in/reset-password?invite=true",
  "https://connect.remoasset.in/auth",
]

[auth.email.template.invite]
subject = "You're invited to RemoAsset Connect"
content_path = "./supabase/email-templates/invite-user.html"

[auth.email.template.confirmation]
subject = "Confirm your RemoAsset Connect email"
content_path = "./supabase/email-templates/confirm-signup.html"

[auth.email.template.recovery]
subject = "Reset your RemoAsset Connect password"
content_path = "./supabase/email-templates/reset-password.html"

[auth.email.template.email_change]
subject = "Your RemoAsset Connect password has been changed"
content_path = "./supabase/email-templates/password-change.html"

